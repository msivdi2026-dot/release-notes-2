changelog:
  categories:
    - title: ⚠️ Breaking Changes
      labels:
        - breaking-change
    - title: ✨ Features
      labels:
        - feature
        - enhancement
    - title: 🐛 Bug Fixes
      labels:
        - bug
        - fix
    - title: ♻️ Refactoring
      labels:
        - refactor
    - title: ⚡ Performance
      labels:
        - performance
    - title: 🔒 Security
      labels:
        - security
    - title: 🧪 Tests
      labels:
        - test
    - title: 🏗️ Build / CI
      labels:
        - build
        - ci
        - dependencies
    - title: 📄 Docs
      labels:
        - documentation
    - title: 🔀 Other
      labels:
        - "*"
  exclude:
    labels:
      - skip-changelog
      - duplicate
      - invalid
